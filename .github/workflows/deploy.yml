name: Build and Deploy to Nomad

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sydus/mcp-marketing-meta-ads
  NOMAD_JOB_NAME: mcp-marketing-meta-ads
  NOMAD_NAMESPACE: agent24-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate version
        id: version
        run: |
          if git describe --tags --exact-match 2>/dev/null; then
            VERSION=$(git describe --tags --exact-match)
          else
            VERSION="v0.0.0-$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          JOB_SPEC=$(curl -s \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -H "X-Nomad-Token: $NOMAD_TOKEN" \
            "$NOMAD_ADDR/v1/job/${{ env.NOMAD_JOB_NAME }}?namespace=${{ env.NOMAD_NAMESPACE }}")
          UPDATED_SPEC=$(echo "$JOB_SPEC" | jq \
            --arg image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION" \
            '.TaskGroups[].Tasks[].Config.image = $image | {Job: .}')
          curl -X POST \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            -H "X-Nomad-Token: $NOMAD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$UPDATED_SPEC" \
            "$NOMAD_ADDR/v1/jobs"
